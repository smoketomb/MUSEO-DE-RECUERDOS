    <script>
        // CONFIGURACIÓN: Pega aquí tu ID de Google Sheets
        const SHEET_ID = '1sL4myyPXLAErfO4c8aw1GyiKzzmV4iWiEHP04ofUra0'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        async function buscarEnlace(etiqueta) {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const filas = data.split('\n').map(row => row.split(','));
            
            for (let i = 1; i < filas.length; i++) {
                let obj = filas[i][0].replace(/"/g, "").trim();
                let url = filas[i][1].replace(/"/g, "").trim();
                if (obj === etiqueta) return url;
            }
            return null;
        }

        // Aquí iría la carga del modelo que descargaste de Colab

    </script>
