<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Recuerdos ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@multimodal/ultralytics-tfjs"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        #info { position: absolute; bottom: 50px; width: 100%; text-align: center; background: rgba(0,0,0,0.6); padding: 15px; }
        .btn { background: #ff4b5c; color: white; border: none; padding: 10px 20px; border-radius: 20px; text-decoration: none; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="info">
        <div id="status">Cargando IA (esto tarda un poco la primera vez)...</div>
        <a id="link-recuerdo" class="btn" target="_blank">Ver recuerdo ✨</a>
    </div>

    <script>
        // 1. CONFIGURACIÓN (Tu ID de Google Sheets)
        const SHEET_ID = '1sL4myyPXLAErfO4c8aw1GyiKzzmV4iWiEHP04ofUra0'; 
        const MODEL_PATH = './model.json'; // Asegúrate de que model.json esté en la misma carpeta

        let model;
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const btnLink = document.getElementById('link-recuerdo');

        // 2. Cargar Google Sheets
        async function getLink(label) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
            const resp = await fetch(url);
            const text = await resp.text();
            const rows = text.split('\n').map(r => r.split(','));
            for (let i = 1; i < rows.length; i++) {
                if (rows[i][0].replace(/"/g, "").trim() === label) {
                    return rows[i][1].replace(/"/g, "").trim();
                }
            }
            return null;
        }

        // 3. Iniciar Cámara e IA
        async function setup() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;

        status.innerText = "Cargando archivos del modelo...";
        
        // Esto nos dirá si el archivo model.json existe
        model = await tf.loadGraphModel(MODEL_PATH);
        
        status.innerText = "✅ IA Lista. Enfoca un objeto";
        detect();
    } catch (error) {
        status.innerText = "❌ ERROR: " + error.message;
        console.error(error);
    }
}

        async function detect() {
            const tfImg = tf.browser.fromPixels(video);
            const smallImg = tf.image.resizeBilinear(tfImg, [640, 640]).div(255.0).expandDims(0);
            
            const result = await model.executeAsync(smallImg);
            // Aquí procesamos la salida de YOLO (simplificado para que funcione directo)
            // Si el modelo detecta algo con confianza > 80%
            // Nota: Esta parte asume que el modelo ya da la etiqueta más probable
            
            // Lógica de detección simplificada
            const prediction = "entrada_barbie"; // PRUEBA: Sustituir por lógica de detección real del modelo
            
            const link = await getLink(prediction);
            if (link) {
                status.innerText = "¡Recuerdo detectado: " + prediction + "!";
                btnLink.href = link;
                btnLink.style.display = 'inline-block';
            }

            tfImg.dispose();
            smallImg.dispose();
            requestAnimationFrame(detect);
        }

        setup();
    </script>
</body>
</html>
